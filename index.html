          <div key={lbl} style={{
            background:T.card,border:`1px solid ${col}30`,borderRadius:14,
            padding:"14px 10px",textAlign:"center",
            boxShadow:completed.length>0?`0 0 12px ${col}15`:"none",
          }}>
            <div style={{fontSize:20,fontWeight:700,color:col,fontFamily:T.mono}}>{val}</div>
            <div style={{fontSize:10,color:T.sub,marginTop:3}}>{lbl}</div>
          </div>
        ))}
      </div>

      {/* TODAY'S MISSION */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:10,letterSpacing:3,color:T.dim,fontFamily:T.mono,textTransform:"uppercase",marginBottom:8}}>⚡ Today's Mission</div>
        {hasMissionToday ? (
          <div onClick={()=>{switchDay(todayDayIdx);setTab("workout");}} style={{
            background:todayMissionDone
              ? "linear-gradient(135deg,#071610,#0a1f14)"
              : `linear-gradient(135deg,${DAYS[todayDayIdx].color}18,${DAYS[todayDayIdx].color}06)`,
            border:`2px solid ${todayMissionDone?T.green+"60":DAYS[todayDayIdx].color+"80"}`,
            borderRadius:16,padding:"18px",cursor:"pointer",
            boxShadow:todayMissionDone
              ? `0 0 20px ${T.green}30`
              : `0 0 20px ${DAYS[todayDayIdx].color}30`,
            transition:"all .2s",
          }}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{
                width:54,height:54,borderRadius:14,flexShrink:0,
                background:todayMissionDone?`${T.green}20`:`${DAYS[todayDayIdx].color}20`,
                border:`2px solid ${todayMissionDone?T.green+"60":DAYS[todayDayIdx].color+"60"}`,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,
                boxShadow:`0 0 12px ${todayMissionDone?T.green:DAYS[todayDayIdx].color}40`,
              }}>
                {todayMissionDone?"🏆":DAYS[todayDayIdx].emoji}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:700,color:todayMissionDone?T.green:T.text}}>
                  {todayMissionDone?"Mission Complete! 🎉":DAYS[todayDayIdx].focus}
                </div>
                <div style={{fontSize:12,color:T.sub,marginTop:3}}>
                  {todayMissionDone
                    ? `Week ${week} · ${DAYS[todayDayIdx].label}`
                    : `Week ${week} · ${DAYS[todayDayIdx].label} · ${WK[week-1].sets}×${WK[week-1].reps}`
                  }
                </div>
                {!todayMissionDone&&<div style={{fontSize:11,color:DAYS[todayDayIdx].color,marginTop:4,fontWeight:600}}>Tap to start → +500 XP</div>}
              </div>
            </div>
          </div>
        ) : (
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"18px",textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:6}}>😤</div>
            <div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:4}}>Rest Day — Recovery Mode</div>
            <div style={{fontSize:12,color:T.sub}}>Next session: {dayOfWeek<=1?"Monday":dayOfWeek<=3?"Wednesday":"Friday"}</div>
          </div>
        )}
      </div>

      {/* Week Progress Bar */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"16px",marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:14,fontWeight:700}}>Week {week} Progress</div>
          <div style={{fontSize:11,color:ph.color,fontFamily:T.mono,fontWeight:700}}>{weekDone}/3 Sessions</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {DAYS.map((d,i)=>{
            const done=completed.some(c=>c.key===`w${week}_d${i}`);
            return(
              <div key={i} onClick={()=>{switchDay(i);setTab("workout");}} style={{
                background:done?`${d.color}18`:T.lift,
                border:`1.5px solid ${done?d.color+"70":T.border}`,
                borderRadius:12,padding:"12px 8px",textAlign:"center",cursor:"pointer",
                boxShadow:done?`0 0 10px ${d.color}40`:"none",
                transition:"all .25s",
              }}>
                <div style={{fontSize:20,marginBottom:4}}>{done?"✅":d.emoji}</div>
                <div style={{fontSize:11,fontWeight:700,color:done?d.color:T.sub,fontFamily:T.mono}}>{d.short}</div>
                <div style={{fontSize:9,color:done?d.color:T.dim,marginTop:2}}>{done?"Done":"Tap"}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Motivational Quote */}
      <div style={{
        background:`linear-gradient(135deg,#1a1525,#131020)`,
        border:`1px solid #b197fc30`,borderRadius:16,padding:"18px",marginBottom:16,
        position:"relative",overflow:"hidden",
      }}>
        <div style={{position:"absolute",top:10,left:14,fontSize:36,opacity:.15,color:"#b197fc",fontFamily:"Georgia,serif",lineHeight:1}}>"</div>
        <div style={{fontSize:13,color:T.sub,lineHeight:1.8,paddingLeft:20,paddingTop:4,fontStyle:"italic"}}>
          {quote.text}
        </div>
        <div style={{fontSize:11,color:"#b197fc",fontFamily:T.mono,marginTop:10,paddingLeft:20,fontWeight:700}}>
          — {quote.author}
        </div>
      </div>

      {/* Current Level */}
      {lvl&&(
        <div onClick={()=>setTab("progress")} style={{
          background:`linear-gradient(135deg,${lvl.color}15,${lvl.color}05)`,
          border:`1.5px solid ${lvl.color}50`,borderRadius:16,padding:"14px 16px",
          display:"flex",alignItems:"center",gap:14,cursor:"pointer",
          boxShadow:`0 0 16px ${lvl.color}20`,
        }}>
          <div style={{fontSize:32,filter:`drop-shadow(0 0 8px ${lvl.color})`}}>{lvl.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:lvl.color,fontFamily:T.mono,letterSpacing:2,marginBottom:3}}>CURRENT LEVEL</div>
            <div style={{fontSize:18,fontWeight:700,color:lvl.color}}>{lvl.name}</div>
            <div style={{fontSize:11,color:T.sub,marginTop:2}}>{lvl.next}</div>
          </div>
          <div style={{color:T.dim,fontSize:18}}>›</div>
        </div>
      )}
    </div>
  );
}

/* ─── MORE TAB ─────────────────────────────────────────────── */
function MoreTab({ setTab, identity }) {
  const [subbed,     setSubbed]    = useState(false);
  const [subLoading, setSubLoading]= useState(false);
  const [subMsg,     setSubMsg]    = useState("");

  const HYPE_PRESETS = [
    { label:"💪 Beast Mode",   msg:"Beast mode activated! Let's get it Daniel — you've got this! 💪🔥" },
    { label:"🔥 On Fire",      msg:"You're on FIRE today Daniel! Every rep is making you better. Keep pushing! 🔥⚾" },
    { label:"⚾ D1 Bound",     msg:"D1 bound! Remember who you're becoming every single day. Work Daniel! ⚾🏆" },
    { label:"🌅 Rise & Grind", msg:"Rise and grind! Champions are made when no one's watching. Let's go! 🌅💪" },
    { label:"🏆 Champion",     msg:"Champions don't quit. Champions don't make excuses. You are a champion Daniel! 🏆" },
    { label:"❤️ Proud of You", msg:"I'm so proud of the work you're putting in. You're becoming something special. Love you son ❤️⚾" },
  ];

  const [hypeCustom,      setHypeCustom]      = useState("");
  const [hypeWorkerStatus,setHypeWorkerStatus] = useState("");
  const [hypeWorkerMsg,   setHypeWorkerMsg]    = useState("");

  const sendHypeWorker = async (msg) => {
    if(!msg.trim()) return;
    setHypeWorkerStatus("sending"); setHypeWorkerMsg("");
    try {
      const res = await fetch("https://baseball-hype.daniel-fajardo.workers.dev", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          app_id: "bc93ad14-e32a-4e02-a487-3819d9e171de",
          included_segments: ["All"],
          headings: {en:"⚾ From Dad 🔥"},
          contents: {en: msg},
          url: "https://cashclowns.github.io/Daniel-Baseball/",
        }),
      });
      const data = await res.json();
      if(data.id) {
        setHypeWorkerStatus("sent");
        setHypeCustom("");
        setHypeWorkerMsg(`Sent to ${data.recipients||1} device(s)!`);
        setTimeout(()=>{setHypeWorkerStatus("");setHypeWorkerMsg("");},4000);
      } else {
        setHypeWorkerStatus("error");
        setHypeWorkerMsg(JSON.stringify(data).slice(0,80));
        setTimeout(()=>{setHypeWorkerStatus("");setHypeWorkerMsg("");},5000);
      }
    } catch(e) {
      setHypeWorkerStatus("error");
      setHypeWorkerMsg(e.message||"Network error");
      setTimeout(()=>{setHypeWorkerStatus("");setHypeWorkerMsg("");},5000);
    }
  };

  useEffect(()=>{
    const check = async () => {
      // Check native browser permission first
      const perm = window.__osPermission ? window.__osPermission() : "default";
      if(perm === "denied") {
        setSubMsg("Notifications blocked. Go to iPhone Settings → Safari → Notifications to allow.");
        return;
      }
      if(window.__osIsSubscribed) {
        const s = await window.__osIsSubscribed();
        setSubbed(s);
      }
    };
    check();
  },[]);

  const enableNotifications = async () => {
    setSubLoading(true);
    setSubMsg("");

    // Must be added to home screen on iOS
    const isStandalone = window.navigator.standalone;
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

    if(isIOS && !isStandalone) {
      setSubMsg("⚠️ Add this app to your Home Screen first, then open it from there to enable notifications.");
      setSubLoading(false);
      return;
    }

    // Check if already denied
    const perm = window.__osPermission ? window.__osPermission() : "default";
    if(perm === "denied") {
      setSubMsg("Notifications are blocked. Open iPhone Settings → Safari → this site → Notifications → Allow.");
      setSubLoading(false);
      return;
    }

    try {
      // Auto-retry waiting for OneSignal to load (up to 5 seconds)
      let tries = 0;
      while(!window.__osPrompt && tries < 10) {
        await new Promise(r=>setTimeout(r,500));
        tries++;
      }
      if(!window.__osPrompt) {
        setSubMsg("⚠️ Could not load. Close the app fully and reopen from your Home Screen icon.");
        setSubLoading(false);
        return;
      }
      await window.__osPrompt();
      // Wait a moment for subscription to register
      await new Promise(r=>setTimeout(r,1500));
      const s = await window.__osIsSubscribed();
      setSubbed(s);
      if(s) {
        if(window.__osTag) window.__osTag(identity);
        setSubMsg("✅ Notifications enabled!");
      } else {
        setSubMsg("Tap 'Allow' when iOS asks to enable notifications.");
      }
    } catch(e) {
      setSubMsg("Something went wrong. Make sure the app is added to your Home Screen.");
    }
    setSubLoading(false);
  };



  const menuItems = [
    { id:"nutrition", icon:"🥗", label:"Nutrition Plan",   sub:"Daily meals & phase targets", color:T.teal  },
    { id:"pledge",    icon:"🤝", label:"Our Pledge",       sub:"Father & son commitment",     color:"#f5c842"},
    { id:"notes",     icon:"📝", label:"Coach Notes",      sub:"Scouting & coaching log",     color:"#b197fc"},
  ];

  return (
    <div>
      {/* Notifications Card */}
      <div style={{background:T.card,border:`1px solid ${subbed?T.green+"50":T.border}`,borderRadius:18,overflow:"hidden",marginBottom:16,
        boxShadow:subbed?`0 0 16px ${T.green}20`:"none"}}>
        <div style={{background:subbed?`${T.green}12`:"#14172a",padding:"16px 18px",borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:28}}>{subbed?"🔔":"🔕"}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700}}>{subbed?"Notifications Active":"Enable Notifications"}</div>
              <div style={{fontSize:12,color:T.sub,marginTop:2}}>{subbed?"You'll get workout reminders & hype messages":"Get workout reminders on your phone"}</div>
            </div>
            {!subbed&&(
              <button onClick={enableNotifications} disabled={subLoading} style={{
                background:`linear-gradient(135deg,${T.blue},#3a8eff)`,border:"none",
                borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,fontWeight:700,
                fontFamily:T.sans,cursor:"pointer",flexShrink:0,
                boxShadow:`0 0 12px ${T.blue}50`,
              }}>{subLoading?"Turning on…":"Turn On"}</button>
            )}
            {subbed&&<div style={{background:`${T.green}20`,border:`1px solid ${T.green}50`,borderRadius:8,padding:"6px 12px",fontSize:12,color:T.green,fontWeight:700}}>✓ ON</div>}
          </div>
          {subMsg&&(
            <div style={{marginTop:10,padding:"10px 14px",background:"rgba(255,255,255,0.05)",borderRadius:10,fontSize:12,color:subMsg.startsWith("✅")?T.green:T.amber,lineHeight:1.5}}>
              {subMsg}
            </div>
          )}
        </div>

        {/* What you'll receive */}
        <div style={{padding:"14px 18px"}}>
          <div style={{fontSize:11,color:T.dim,fontFamily:T.mono,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>What You'll Get</div>
          {[
            ["⏰","Workout Reminders","Mon, Wed, Fri mornings so you never miss a session"],
            ["🏆","Session Complete","Celebration notification when a workout is logged"],
            ["📅","Event Alerts","Night-before reminder for tryouts, games & showcases"],
            ["❤️","Hype Messages","Custom encouragement from Dad anytime"],
          ].map(([icon,title,desc])=>(
            <div key={title} style={{display:"flex",gap:12,padding:"8px 0",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:20,flexShrink:0}}>{icon}</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:T.text}}>{title}</div>
                <div style={{fontSize:11,color:T.sub,marginTop:1}}>{desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* SEND HYPE — Dad only */}
      {identity==="Dad"&&(
        <div style={{background:T.card,border:`1px solid #ff5c5c30`,borderRadius:18,overflow:"hidden",marginBottom:16,boxShadow:"0 0 16px #ff5c5c10"}}>
          <div style={{background:"#1f0a0a",padding:"14px 18px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:24}}>🔥</span>
            <div>
              <div style={{fontSize:15,fontWeight:700}}>Send Hype to Daniel</div>
              <div style={{fontSize:11,color:T.sub,marginTop:1}}>Push a message straight to his phone</div>
            </div>
          </div>
          <div style={{padding:"14px 18px"}}>
            <div style={{fontSize:11,color:T.dim,fontFamily:T.mono,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Quick Hype</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {HYPE_PRESETS.map((p,i)=>(
                <button key={i} onClick={()=>sendHypeWorker(p.msg)} style={{
                  background:"#1a1e2b",border:`1px solid ${T.border2}`,borderRadius:10,
                  padding:"10px 8px",color:T.text,fontSize:12,fontFamily:T.sans,
                  cursor:"pointer",textAlign:"left",lineHeight:1.4,
                }}>{p.label}</button>
              ))}
            </div>
            <textarea value={hypeCustom} onChange={e=>setHypeCustom(e.target.value)}
              placeholder="Type your own message to Daniel…"
              rows={3} style={{...iStyle(),resize:"none",marginBottom:10}}/>
            <button onClick={()=>sendHypeWorker(hypeCustom)} disabled={!hypeCustom.trim()||hypeWorkerStatus==="sending"} style={{
              width:"100%",
              background:hypeCustom.trim()?"linear-gradient(135deg,#ff5c5c,#ff8c00)":"#1a1e2b",
              border:`1px solid ${hypeCustom.trim()?"#ff5c5c":T.border}`,
              borderRadius:12,padding:"14px",
              color:hypeCustom.trim()?"#fff":T.dim,
              fontSize:14,fontWeight:700,fontFamily:T.sans,
              cursor:hypeCustom.trim()?"pointer":"default",
              boxShadow:hypeCustom.trim()?"0 0 16px #ff5c5c50":"none",
              transition:"all .2s",marginBottom:8,
            }}>
              {hypeWorkerStatus==="sending"?"Sending… 🚀":
               hypeWorkerStatus==="sent"?"✓ Fired to Daniel! 🔥":
               hypeWorkerStatus==="error"?"⚠️ Error — try the dashboard":
               "🔥 Send Now"}
            </button>
            {hypeWorkerMsg&&(
              <div style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",fontSize:11,color:T.sub,marginBottom:6}}>{hypeWorkerMsg}</div>
            )}
            <a href="https://dashboard.onesignal.com/apps/bc93ad14-e32a-4e02-a487-3819d9e171de/notifications/new" target="_blank" rel="noopener" style={{
              display:"block",textAlign:"center",padding:"8px",
              fontSize:11,color:T.dim,textDecoration:"none",
            }}>Or use the dashboard →</a>
          </div>
        </div>
      )}

      
      {/* Menu Items */}
      <div style={{fontSize:10,letterSpacing:3,color:T.dim,fontFamily:T.mono,textTransform:"uppercase",marginBottom:10}}>More Sections</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {menuItems.map(item=>(
          <div key={item.id} onClick={()=>setTab(item.id)} style={{
            background:T.card,border:`1px solid ${item.color}25`,borderRadius:14,
            padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,
          }}>
            <div style={{width:44,height:44,borderRadius:12,background:`${item.color}18`,border:`1px solid ${item.color}35`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
              {item.icon}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700}}>{item.label}</div>
              <div style={{fontSize:12,color:T.sub,marginTop:2}}>{item.sub}</div>
            </div>
            <div style={{color:T.dim,fontSize:20}}>›</div>
          </div>
        ))}
      </div>

      {/* Identity */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:T.dim,fontFamily:T.mono,textTransform:"uppercase",marginBottom:12}}>Device Profile</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:12,background:`${ID[identity]?.color}20`,border:`1px solid ${ID[identity]?.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
            {identity==="Daniel"?"D":"👨"}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:ID[identity]?.color}}>{identity}</div>
            <div style={{fontSize:12,color:T.sub}}>{identity==="Daniel"?"Player · 14U Infield":"Coach & Father"}</div>
          </div>
          <button onClick={()=>{localStorage.removeItem("djr_identity");window.location.reload();}}
            style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,padding:"7px 14px",color:T.dim,fontSize:12,fontFamily:T.sans,cursor:"pointer"}}>
            Switch
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
