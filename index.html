/* ─── FIREBASE HELPERS ────────────────────────────────────── */
const ROOT = "djr_tracker";
const SK = (w,d) => `${ROOT}/sessions/w${w}_d${d}`;
const stamp = (who) => ({ by: who, at: new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) });

const fbSet  = (path, val) => { try { window.__fbSet(window.__fbRef(window.__fbDb, path), val); } catch(e){} };
const fbUpd  = (path, val) => { try { window.__fbUpdate(window.__fbRef(window.__fbDb, path), val); } catch(e){} };
const fbListen = (path, cb) => window.__fbOnValue(window.__fbRef(window.__fbDb, path), snap => cb(snap.val()));

/* ─── SESSION STRUCTURE ───────────────────────────────────── */
const emptyEx = (ns) => ({
  sets: Array.from({length:ns},()=>({done:false,reps:"",by:"",at:""})),
  weight:"", weightBy:"", weightAt:"",
  time:"",   timeBy:"",   timeAt:"",
  feel:"",   feelBy:"",   feelAt:"",
  notes:"",  notesBy:"",  notesAt:"",
});
const emptySession = (di, ns) => ({
  warmup:   new Array(DAYS[di].warmup.length).fill(false),
  exercises:DAYS[di].exercises.map(()=>emptyEx(ns)),
  cooldown: new Array(DAYS[di].cooldown.length).fill(false),
  energy:"", energyBy:"", energyAt:"",
  sessionNote:"", noteBy:"", noteAt:"",
  done:false, date:null, loggedBy:"",
});

  if (!by) return null;
  const id = ID[by] || ID.Dad;
  return (
    <span title={`${by} · ${at||""}`} style={{
      background:`${id.color}18`, border:`1px solid ${id.color}40`,
      color:id.color, borderRadius:5, padding:"1px 6px",

    }}>{id.short}</span>
  );
}

/* ─── RING ────────────────────────────────────────────────── */
function Ring({pct,color,size=72,stroke=6}){
  const r=(size-stroke*2)/2,c=2*Math.PI*r;
  const done=pct===100;
  return(
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0,filter:done?`drop-shadow(0 0 6px ${color}) drop-shadow(0 0 14px ${color}88)`:"none",transition:"filter .5s"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none"
        stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={c-(pct/100)*c}
        strokeLinecap="round"
        style={{transition:"stroke-dashoffset .6s cubic-bezier(.4,0,.2,1), stroke .4s"}}/>
      {done&&<circle cx={size/2} cy={size/2} r={r} fill="none"
        stroke={color} strokeWidth={stroke+2} opacity={0.25}
        strokeDasharray={c} strokeDashoffset={0}
        strokeLinecap="round"
        style={{animation:"glow-pulse 2s ease-in-out infinite"}}/>}
    </svg>
  );
}

/* ─── APP ─────────────────────────────────────────────────── */
function App() {
  const [fbReady,   setFbReady]   = useState(false);
  const [identity,  setIdentity]  = useState(null);  // "Dad"|"Daniel" — device-local
  const [tab,       setTab]       = useState("workout");
  const [week,      setWeekRaw]   = useState(1);
  const [dayIdx,    setDayIdx]    = useState(0);
  const [session,   setSession]   = useState(null);
  const [completed, setCompleted] = useState([]);
  const [syncing,   setSyncing]   = useState(false);
  const unsubRef = useRef(null);

  // Wait for Firebase module to load
  useEffect(()=>{
    const check = setInterval(()=>{
      if(window.__fbReady){ clearInterval(check); setFbReady(true); }
    },100);
    return ()=>clearInterval(check);
  },[]);

  // Load device identity from localStorage
  useEffect(()=>{
    const id = localStorage.getItem("djr_identity");
    if(id) setIdentity(id);
  },[]);

  // Subscribe to shared data once FB + identity are ready
  useEffect(()=>{
    if(!fbReady || !identity) return;
    // Load meta
    fbListen(`${ROOT}/meta`, val => {
      if(val){ setWeekRaw(val.week||1); setDayIdx(val.dayIdx||0); }
    });
    fbListen(`${ROOT}/completed`, val => {
      setCompleted(val ? Object.values(val) : []);
    });
  },[fbReady, identity]);

  // Subscribe to current session
  useEffect(()=>{
    if(!fbReady||!identity) return;
    if(unsubRef.current) unsubRef.current();
    const path = SK(week,dayIdx);
    const unsub = fbListen(path, val => {
      setSession(val || emptySession(dayIdx, WK[week-1].sets));
    });
    // onValue returns unsubscribe fn
    unsubRef.current = unsub;
    return ()=>{ if(unsubRef.current) unsubRef.current(); };
  },[fbReady, identity, week, dayIdx]);

  const saveIdentity = (id) => {
    localStorage.setItem("djr_identity",id); setIdentity(id);
  };

  const setWeek = (w) => {
    setWeekRaw(w);
    fbUpd(`${ROOT}/meta`,{week:w,dayIdx});
  };
  const switchDay = (di) => {
    setDayIdx(di);
    fbUpd(`${ROOT}/meta`,{week,dayIdx:di});
  };

  const upd = useCallback((patch) => {
    setSyncing(true);
    fbUpd(SK(week,dayIdx), patch);
    setTimeout(()=>setSyncing(false),600);
  },[week,dayIdx]);

  const markDone = (loggedBy) => {
    const k = `w${week}_d${dayIdx}`;
    const date = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    const time = new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
    fbUpd(SK(week,dayIdx),{done:true,date,loggedBy,completedAt:`${date} ${time}`});
    fbSet(`${ROOT}/completed/${k}`,{key:k,week,dayIdx,date,loggedBy,completedAt:`${date} ${time}`});
  };

  if(!fbReady) return <Splash msg="Connecting to database…"/>;
  if(!identity) return <IdentityScreen onSelect={saveIdentity}/>;
  if(!session)  return <Splash msg="Loading tracker…"/>;

  const ph = PHASE[gPhase(week)];
  const idInfo = ID[identity];

  return(
    <div style={{fontFamily:T.sans,background:T.bg,minHeight:"100dvh",color:T.text}}>
      <Header week={week} ph={ph} completed={completed} identity={identity} idInfo={idInfo} onSwitch={()=>{localStorage.removeItem("djr_identity");setIdentity(null);}} syncing={syncing}/>
      <div className="main-content" style={{maxWidth:700,margin:"0 auto",padding:"16px 14px 0px",paddingBottom:"calc(140px + env(safe-area-inset-bottom))"}}>

  return(
    <div
      className={allDone?"card-complete":""}
      style={{
        "--gc": color+"66",
        background:allDone?`linear-gradient(135deg,${color}14 0%,${color}06 100%)`:T.card,
        border:`1.5px solid ${allDone?color+"80":T.border}`,
        borderRadius:14,overflow:"hidden",
        boxShadow:allDone?`0 0 14px ${color}40,inset 0 0 30px ${color}06`:"none",

        <div style={{
          width:12,height:12,borderRadius:"50%",flexShrink:0,
          background:allDone?`radial-gradient(circle,${color}ff,${color}99)`:T.dim,
          border:`2px solid ${allDone?color:T.dim}`,

/* ─── WORKOUT TAB ─────────────────────────────────────────── */
function WorkoutTab({week,setWeek,dayIdx,switchDay,session,completed,upd,markDone,identity}){
  const cfg=WK[week-1], day=DAYS[dayIdx], ph=PHASE[gPhase(week)];
  const sk=`w${week}_d${dayIdx}`;
  const isDone = session.done||completed.some(c=>c.key===sk);
  const exercises = session.exercises
    ? (Array.isArray(session.exercises)?session.exercises:Object.values(session.exercises))
    : [];
  const warmup  = session.warmup ? (Array.isArray(session.warmup)?session.warmup:Object.values(session.warmup)) : [];
  const cooldown = session.cooldown ? (Array.isArray(session.cooldown)?session.cooldown:Object.values(session.cooldown)) : [];
  const exDone  = exercises.filter(e=>{ const s=Array.isArray(e.sets)?e.sets:Object.values(e.sets||{}); return s.length>0&&s.every(x=>x.done); }).length;
  const exTotal = exercises.length;
  const pct     = exTotal>0?Math.round(exDone/exTotal*100):0;
  const warmDone = warmup.filter(Boolean).length;
  const coolDone = cooldown.filter(Boolean).length;
  const [showWarm, setShowWarm] = useState(true);
  const [showCool, setShowCool] = useState(false);
  const [whoLogged, setWhoLogged] = useState(identity);

  const s = stamp(identity);

  const toggleWarmup = (i) => {
    const a = [...warmup]; a[i] = !a[i];
    // Store warmup as {done, by, at} per item
    const meta = session.warmupMeta ? (Array.isArray(session.warmupMeta)?[...session.warmupMeta]:[...Object.values(session.warmupMeta)]) : Array(warmup.length).fill(null);
    meta[i] = a[i] ? {by:identity,at:s.at} : null;
    upd({warmup:a, warmupMeta:meta});
  };
  const toggleCooldown = (i) => {
    const a = [...cooldown]; a[i] = !a[i];
    const meta = session.cooldownMeta ? (Array.isArray(session.cooldownMeta)?[...session.cooldownMeta]:[...Object.values(session.cooldownMeta)]) : Array(cooldown.length).fill(null);
    meta[i] = a[i] ? {by:identity,at:s.at} : null;
    upd({cooldown:a, cooldownMeta:meta});
  };
  const updateEx = (i, patch) => {
    const a = [...exercises]; a[i] = {...a[i],...patch};
    upd({exercises:a});
  };
  const toggleSet = (ei, si) => {
    const a=[...exercises];
    const sets=Array.isArray(a[ei].sets)?[...a[ei].sets]:[...Object.values(a[ei].sets||{})];
    const done=!sets[si].done;
    sets[si]={...sets[si],done,...(done?{by:identity,at:s.at}:{by:"",at:""})};
    a[ei]={...a[ei],sets}; upd({exercises:a});
  };
  const updateSetReps = (ei, si, val) => {
    const a=[...exercises];
    const sets=Array.isArray(a[ei].sets)?[...a[ei].sets]:[...Object.values(a[ei].sets||{})];
    sets[si]={...sets[si],reps:val}; a[ei]={...a[ei],sets}; upd({exercises:a});
  };

  const warmupMeta = session.warmupMeta ? (Array.isArray(session.warmupMeta)?session.warmupMeta:Object.values(session.warmupMeta)) : [];
  const cooldownMeta = session.cooldownMeta ? (Array.isArray(session.cooldownMeta)?session.cooldownMeta:Object.values(session.cooldownMeta)) : [];

  return(
    <div>
      {/* Week Selector */}
      <div style={{marginBottom:20}}>
        <Label text="Select Week"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>
          {[1,2,3,4,5,6].map(w=>{
            const wp=PHASE[gPhase(w)],wDone=completed.filter(c=>c.week===w).length,active=w===week;
            return(
              <button key={w} onClick={()=>setWeek(w)} style={{background:active?wp.color:T.card,border:`1px solid ${active?wp.color:wDone===3?wp.color+"44":T.border}`,borderRadius:10,padding:"9px 4px",cursor:"pointer",textAlign:"center",transition:"all .2s"}}>
                <div style={{fontSize:13,fontWeight:700,color:active?"#fff":T.sub,fontFamily:T.mono}}>W{w}</div>
                <div style={{display:"flex",justifyContent:"center",gap:2,marginTop:5}}>
                  {[0,1,2].map(di=><div key={di} style={{width:5,height:5,borderRadius:"50%",background:completed.some(c=>c.key===`w${w}_d${di}`)?(active?"#fff":wp.color):"rgba(255,255,255,0.1)"}}/>)}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Phase Banner */}
      <div style={{background:ph.bg,border:`1px solid ${ph.color}25`,borderRadius:14,padding:"14px 18px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:11,color:ph.color,fontFamily:T.mono,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>{ph.label} Phase · Week {week}</div>
          <div style={{fontSize:14,color:T.text}}>{cfg.note}</div>
          <div style={{fontSize:11,color:T.sub,marginTop:3}}>Load: {cfg.inc}</div>
        </div>
        <div style={{textAlign:"center",flexShrink:0,marginLeft:12}}>
          <div style={{fontSize:22,fontWeight:700,color:ph.color,fontFamily:T.mono}}>{cfg.sets}×{cfg.reps}</div>
          <div style={{fontSize:10,color:T.sub,fontFamily:T.mono}}>{cfg.rest} rest</div>
        </div>
      </div>

      {/* Day Tabs */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
        {DAYS.map((d,i)=>{
          const k=`w${week}_d${i}`,done=completed.some(c=>c.key===k),active=dayIdx===i;
          return(
            <button key={i} onClick={()=>switchDay(i)} style={{
              background:active
                ? `radial-gradient(ellipse at 40% 30%, ${d.color}dd, ${d.color}99)`
                : done ? `${d.color}18` : T.card,
              border:`2px solid ${active?d.color:done?d.color+"70":T.border}`,
              borderRadius:14,padding:"14px 10px",cursor:"pointer",textAlign:"center",
              transition:"all .3s cubic-bezier(.4,0,.2,1)",position:"relative",
              boxShadow: active
                ? `0 0 18px ${d.color}99, 0 0 36px ${d.color}44`
                : done ? `0 0 10px ${d.color}50, 0 0 20px ${d.color}25` : "none",
            }}>
              {done&&!active&&<span className="badge-pop" style={{position:"absolute",top:7,right:9,fontSize:10,color:d.color,fontWeight:700,textShadow:`0 0 6px ${d.color}`}}>✓</span>}
              <div style={{fontSize:26,marginBottom:5,filter:active?`drop-shadow(0 0 6px ${d.color}99)`:"none",transition:"filter .3s"}}>{d.emoji}</div>
              <div style={{fontSize:13,fontWeight:700,color:active?"#fff":done?d.color:T.sub,fontFamily:T.mono,textShadow:active?`0 0 8px rgba(255,255,255,0.4)`:done?`0 0 6px ${d.color}88`:"none"}}>{d.short}</div>
              <div style={{fontSize:11,color:active?"rgba(255,255,255,.75)":T.dim,marginTop:2}}>{d.label}</div>
              {done&&<div style={{position:"absolute",inset:0,borderRadius:13,background:`radial-gradient(ellipse at center,${d.color}08,transparent)`,pointerEvents:"none"}}/>}
            </button>
          );
        })}
      </div>

      {/* Progress Ring */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"16px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:18}}>
        <div style={{position:"relative",flexShrink:0}}>
          <Ring pct={pct} color={isDone?T.green:day.color} size={72} stroke={6}/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:13,fontWeight:700,color:isDone?T.green:day.color,fontFamily:T.mono}}>{pct}%</span>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{isDone?"Workout Complete! 🎉":`${exDone}/${exTotal} exercises done`}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px 16px"}}>
            {[["💪",`${exDone}/${exTotal} exercises`],["🔥",`${warmDone}/${day.warmup.length} warm-up`],["❄️",`${coolDone}/${day.cooldown.length} cool-down`]].map(([icon,txt])=>(
              <span key={txt} style={{fontSize:12,color:T.sub}}>{icon} {txt}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Energy */}
      {!isDone&&(
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 18px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:600}}>Pre-Workout Energy</div>
            {session.energyBy&&<ByBadge by={session.energyBy} at={session.energyAt}/>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {["😴 1","😐 2","🙂 3","😤 4","🔥 5"].map((lbl,i)=>{
              const val=String(i+1),s=stamp(identity);
              return<button key={i} onClick={()=>upd({energy:val,energyBy:identity,energyAt:s.at})} style={{flex:1,padding:"9px 4px",borderRadius:9,background:session.energy===val?`${day.color}30`:"#1a1e2b",border:`1px solid ${session.energy===val?day.color:T.border}`,color:session.energy===val?day.color:T.sub,fontSize:12,fontFamily:T.sans,cursor:"pointer",transition:"all .2s",textAlign:"center"}}>{lbl}</button>;
            })}
          </div>
        </div>
      )}

      {/* Warm-Up */}
      <Accordion title="Warm-Up" badge={`${warmDone}/${day.warmup.length}`} color={day.color} open={showWarm} onToggle={()=>setShowWarm(v=>!v)}>
        {day.warmup.map((item,i)=>(
          <CheckRow key={i} checked={!!warmup[i]} onToggle={()=>toggleWarmup(i)} label={item} color={day.color}
            by={warmupMeta[i]?.by} at={warmupMeta[i]?.at}/>
        ))}
      </Accordion>

      {/* Exercises */}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <Label text="Exercises"/>
          <span style={{fontSize:11,color:T.sub,fontFamily:T.mono}}>{cfg.sets} sets × {cfg.reps} reps · {cfg.rest} rest</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {day.exercises.map((ex,i)=>(
            <ExCard key={i} ex={ex} cfg={cfg} data={exercises[i]||emptyEx(cfg.sets)} color={day.color} identity={identity}
              onToggleSet={(si)=>toggleSet(i,si)}
              onUpdateSetReps={(si,v)=>updateSetReps(i,si,v)}
              onChange={(patch)=>updateEx(i,patch)}/>
          ))}
        </div>
      </div>

      {/* Cool-Down */}
      <Accordion title="Cool-Down" badge={`${coolDone}/${day.cooldown.length}`} color={day.color} open={showCool} onToggle={()=>setShowCool(v=>!v)}>
        {day.cooldown.map((item,i)=>(
          <CheckRow key={i} checked={!!cooldown[i]} onToggle={()=>toggleCooldown(i)} label={item} color={day.color}
            by={cooldownMeta[i]?.by} at={cooldownMeta[i]?.at}/>
        ))}
      </Accordion>

      {/* Session Notes */}
      {!isDone&&(
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"14px 18px",marginTop:4,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:600}}>Session Notes</div>
            {session.noteBy&&<ByBadge by={session.noteBy} at={session.noteAt}/>}
          </div>
          <textarea value={session.sessionNote||""} onChange={e=>{const s=stamp(identity);upd({sessionNote:e.target.value,noteBy:identity,noteAt:s.at});}}
            placeholder="How did the workout go? PRs, highlights, notes…"
            rows={3} style={{...iStyle(),resize:"none",fontSize:13}}/>
        </div>
      )}

      {/* Mark Complete */}
      {!isDone?(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{flex:1,fontSize:13,fontWeight:600,color:T.sub}}>Completing as:</div>
            {["Daniel","Dad"].map(who=>{
              const id=ID[who];
              return<button key={who} onClick={()=>setWhoLogged(who)} style={{padding:"8px 20px",borderRadius:9,background:whoLogged===who?`${id.color}25`:"#1a1e2b",border:`1px solid ${whoLogged===who?id.color:T.border}`,color:whoLogged===who?id.color:T.sub,fontSize:13,fontFamily:T.sans,cursor:"pointer",fontWeight:600}}>{who}</button>;
            })}
          </div>
          <button onClick={pct===100?()=>markDone(whoLogged):undefined} style={{width:"100%",background:pct===100?day.color:T.card,border:`2px solid ${pct===100?day.color:T.border}`,borderRadius:14,padding:"17px",color:pct===100?"#fff":T.dim,fontSize:15,fontWeight:700,fontFamily:T.sans,cursor:pct===100?"pointer":"default",transition:"all .3s"}}>
            {pct===100?"✓  Mark Workout Complete":`Finish all ${exTotal} exercises to unlock`}
          </button>
        </div>
      ):(
        <div className="champion-card" style={{background:"linear-gradient(135deg,#071610,#0b2016)",border:`1.5px solid ${T.green}60`,borderRadius:16,padding:"28px 22px",textAlign:"center"}}>
          <div style={{fontSize:44,marginBottom:10,filter:`drop-shadow(0 0 14px ${T.green})`}}>🏆</div>
          <div className="shimmer-text" style={{fontSize:22,fontWeight:700,marginBottom:6}}>Workout Complete!</div>
          <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
            {session.date&&<span style={{fontSize:12,color:T.sub,fontFamily:T.mono}}>{session.date}</span>}
            {session.loggedBy&&<ByBadge by={session.loggedBy} at={session.completedAt}/>}
          </div>
          {session.sessionNote&&<div style={{marginTop:14,background:`${T.green}08`,border:`1px solid ${T.green}25`,borderRadius:10,padding:"12px 14px",fontSize:13,color:T.sub,textAlign:"left",lineHeight:1.6}}>"{session.sessionNote}"</div>}
        </div>
      )}
    </div>
  );
}

/* ─── PROGRESS TAB ────────────────────────────────────────── */
function ProgressTab({completed,week,setWeek,setDayIdx,setTab}){
  const total=completed.length, pct=Math.round(total/18*100);
  const danielCount = completed.filter(c=>c.loggedBy==="Daniel").length;
  const dadCount    = completed.filter(c=>c.loggedBy==="Dad").length;
  const streak=(()=>{
    if(!completed.length)return 0;
    const sorted=[...completed].sort((a,b)=>(b.week*3+b.dayIdx)-(a.week*3+a.dayIdx));
    let s=1;
    for(let i=1;i<sorted.length;i++){if((sorted[i-1].week*3+sorted[i-1].dayIdx)-(sorted[i].week*3+sorted[i].dayIdx)===1)s++;else break;}
    return s;
  })();

  return(
    <div>
      {/* Hero */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:"20px",marginBottom:16,display:"flex",gap:20,alignItems:"center"}}>
        <div style={{position:"relative",flexShrink:0}}>
          <Ring pct={pct} color={T.green} size={84} stroke={7}/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:18,fontWeight:700,color:T.green,fontFamily:T.mono}}>{pct}%</span>
          </div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>{total} of 18 sessions</div>
          <div style={{fontSize:12,color:T.sub,marginBottom:12}}>{18-total} remaining</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {[[streak,"Streak",T.amber],[Math.min(week,6),"Week",T.blue],[completed.filter(c=>c.week===week).length+"/3","This week",T.teal]].map(([v,l,c])=>(
              <div key={l}><div style={{fontSize:20,fontWeight:700,color:c,fontFamily:T.mono}}>{v}</div><div style={{fontSize:11,color:T.sub}}>{l}</div></div>
            ))}
          </div>
        </div>
      </div>

      {/* Who's logging */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        {[["Daniel",danielCount,T.blue],["Dad",dadCount,T.orange]].map(([who,count,color])=>(
          <div key={who} style={{background:T.card,border:`1px solid ${color}30`,borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,borderRadius:10,background:`${color}15`,border:`1px solid ${color}35`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color,flexShrink:0}}>{who==="Daniel"?"D":"👨"}</div>
            <div>
              <div style={{fontSize:18,fontWeight:700,color}}>{count}</div>
              <div style={{fontSize:11,color:T.sub}}>{who} logged</div>
            </div>
          </div>
        ))}
      </div>

      {/* 6-Week Map */}
      <Label text="6-Week Map — tap to open"/>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
        {[1,2,3,4,5,6].map(w=>{
          const wp=PHASE[gPhase(w)],active=w===week,wDone=completed.filter(c=>c.week===w).length;
          return(
            <div key={w} style={{display:"flex",gap:8,alignItems:"stretch"}}>
              <button onClick={()=>{setWeek(w);setTab("workout");}} style={{background:active?wp.color:wDone===3?`${wp.color}15`:T.card,border:`1px solid ${active?wp.color:wDone===3?wp.color+"55":T.border}`,borderRadius:10,padding:"0 10px",cursor:"pointer",minWidth:48,textAlign:"center",color:active?"#fff":wDone===3?wp.color:T.sub,transition:"all .2s"}}>
                <div style={{fontSize:12,fontWeight:700,fontFamily:T.mono}}>W{w}</div>
                <div style={{fontSize:9,opacity:.7,fontFamily:T.mono}}>{wDone===3?"✓":wDone+"/3"}</div>
              </button>
              <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {DAYS.map((d,di)=>{
                  const k=`w${w}_d${di}`,rec=completed.find(c=>c.key===k);
                  const logId = rec?.loggedBy ? ID[rec.loggedBy] : null;
                  return(
                    <div key={di} onClick={()=>{setWeek(w);setDayIdx(di);setTab("workout");}} style={{
                      background:rec?`linear-gradient(135deg,${d.color}20,${d.color}08)`:T.card,
                      border:`1.5px solid ${rec?d.color+"80":T.border}`,
                      borderRadius:10,padding:"8px 6px",textAlign:"center",cursor:"pointer",
                      transition:"all .35s",
                      boxShadow:rec?`0 0 8px ${d.color}50,0 0 18px ${d.color}20`:"none",
                    }}>
                      <div style={{fontSize:11,color:rec?d.color:T.dim,fontFamily:T.mono,fontWeight:700}}>{d.short}</div>
                      <div style={{fontSize:18,margin:"3px 0",color:rec?d.color:T.dim,filter:rec?`drop-shadow(0 0 4px ${d.color})`:"none"}}>{rec?"✓":"○"}</div>
                      {rec&&logId&&<div style={{fontSize:9,color:logId.color,fontFamily:T.mono,fontWeight:700}}>{logId.short}</div>}
                      {rec?.date&&<div style={{fontSize:9,color:T.dim,fontFamily:T.mono}}>{rec.date}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Session Log */}
      <Label text="Session Log"/>
      {completed.length===0?(
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"36px 20px",textAlign:"center"}}>
          <div><img src="./logo.png" alt="D.F." style={{width:70,height:"auto",marginBottom:10,opacity:.6}}/></div>
          <div style={{fontSize:15,color:T.sub}}>No workouts logged yet</div>
          <div style={{fontSize:12,color:T.dim,marginTop:5}}>Head to Workout to get started</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[...completed].sort((a,b)=>(b.week*3+b.dayIdx)-(a.week*3+a.dayIdx)).map((c,i)=>{
            const d=DAYS[c.dayIdx],logId=c.loggedBy?ID[c.loggedBy]:null;
            return(
              <div key={i} onClick={()=>{setWeek(c.week);setDayIdx(c.dayIdx);setTab("workout");}} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                <div style={{width:40,height:40,borderRadius:10,background:`${d.color}15`,border:`1px solid ${d.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{d.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700}}>Week {c.week} · {d.label}</div>
                  <div style={{fontSize:12,color:T.sub,marginTop:1}}>{d.focus}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                  {c.date&&<div style={{fontSize:11,color:T.sub,fontFamily:T.mono}}>{c.date}</div>}
                  {logId&&<ByBadge by={c.loggedBy} at={c.completedAt}/>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── PLEDGE TAB ──────────────────────────────────────────── */
function PledgeTab({ identity }) {
  const [pledges,    setPledges]    = useState({ daniel:{}, dad:{} });
  const [danielSig,  setDanielSig]  = useState("");
  const [dadSig,     setDadSig]     = useState("");
  const [danielDate, setDanielDate] = useState("");
  const [dadDate,    setDadDate]    = useState("");
  const [saving,     setSaving]     = useState("");

  useEffect(()=>{
    fbListen(`${ROOT}/pledges`, val => {
      if(val) setPledges(val);
    });
    // Default dates to today
    const today = new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
    setDanielDate(today); setDadDate(today);
  },[]);

  const signPledge = (who) => {
    const sig  = who==="daniel" ? danielSig : dadSig;
    const date = who==="daniel" ? danielDate : dadDate;
    if(!sig.trim()) return;
    setSaving(who);
    const data = { signed:true, signature:sig.trim(), date, signedAt:new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}) };
    fbUpd(`${ROOT}/pledges/${who}`, data);
    setTimeout(()=>setSaving(""),800);
  };

/* ─── CALENDAR TAB ────────────────────────────────────────── */
const EVENT_TYPES = [
  { id:"tryout",  label:"Tryout",       color:"#ff5c5c", icon:"⚾" },
  { id:"practice",label:"Practice",     color:"#5aadff", icon:"🏋️" },
  { id:"game",    label:"Game",          color:"#00d9a3", icon:"🏆" },
  { id:"showcase",label:"Showcase",     color:"#ffb84d", icon:"🌟" },
  { id:"other",   label:"Other",         color:"#b197fc", icon:"📌" },
];
const evColor = (type) => EVENT_TYPES.find(t=>t.id===type)?.color || "#8890aa";
const evIcon  = (type) => EVENT_TYPES.find(t=>t.id===type)?.icon  || "📌";

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function CalendarTab({ identity }) {
  const now = new Date();
  const [year,  setYear]   = useState(now.getFullYear());
  const [month, setMonth]  = useState(now.getMonth());
  const [events, setEvents]= useState({});
  const [modal,  setModal] = useState(null); // {date, event?} — null=closed
  const [form,   setForm]  = useState({});
  const [delConfirm, setDelConfirm] = useState(null);

  useEffect(()=>{
    fbListen(`${ROOT}/calendar`, val => setEvents(val||{}));
  },[]);

  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay    = new Date(year, month, 1).getDay();
  const todayStr    = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

  const dateKey = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  // Flatten all events into a list with start/end
  const allEvents = Object.entries(events)
    .flatMap(([dk,evs])=>Object.values(evs).map(ev=>({
      ...ev,
      startDate: ev.startDate||dk,
      endDate:   ev.endDate||ev.startDate||dk,
      dateKey:   dk,
    })));

  // Get events active on a given day (including multi-day spans)
  const eventsForDate = (dk) => allEvents.filter(ev=>dk>=ev.startDate && dk<=ev.endDate);

  // Position of day in multi-day span: "start"|"middle"|"end"|"single"
  const spanPos = (ev,dk) => {
    const isStart = dk===ev.startDate;
    const isEnd   = dk===ev.endDate;
    if(isStart&&isEnd) return "single";
    if(isStart)        return "start";
    if(isEnd)          return "end";
    return "middle";
  };

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  const openAdd = (dk) => {
    setForm({ startDate:dk, endDate:dk, type:"tryout", team:"", time:"", location:"", notes:"" });
    setModal({ mode:"add", date:dk });
  };
  const openEdit = (ev) => {
    setForm({ ...ev });
    setModal({ mode:"edit", date:ev.startDate, eventId:ev.id });
  };

  const saveEvent = () => {
    if(!form.team?.trim() && !form.notes?.trim()) return;
    const id  = modal.mode==="edit" ? modal.eventId : `ev_${Date.now()}`;
    const start = form.startDate||modal.date;
    const end   = form.endDate && form.endDate>=start ? form.endDate : start;
    const s = { id, ...form, startDate:start, endDate:end, dateKey:start,
      by: identity,
      at: new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}),
    };
    // If editing, remove old entry first then save at new startDate
    if(modal.mode==="edit") {
      window.__fbSet(window.__fbRef(window.__fbDb,`${ROOT}/calendar/${modal.date}/${id}`), null);
    }
    fbUpd(`${ROOT}/calendar/${start}/${id}`, s);
    setModal(null);
  };

  const deleteEvent = (ev) => {
    window.__fbSet(window.__fbRef(window.__fbDb,`${ROOT}/calendar/${ev.startDate}/${ev.id}`), null);
    setDelConfirm(null); setModal(null);
  };

  // Upcoming: deduplicate by id, only show start date once, sorted
  const upcoming = allEvents
    .filter((ev,i,arr)=>arr.findIndex(e=>e.id===ev.id)===i)
    .filter(ev=>ev.endDate>=todayStr)
    .sort((a,b)=>a.startDate.localeCompare(b.startDate))
    .slice(0,8);

  return (
    <div>
      {/* Month Nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <button onClick={prevMonth} style={{width:44,height:44,borderRadius:12,background:T.card,border:`1px solid ${T.border}`,color:T.text,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:-.3}}>{MONTHS[month]}</div>
          <div style={{fontSize:12,color:T.sub,fontFamily:T.mono}}>{year}</div>
        </div>
        <button onClick={nextMonth} style={{width:44,height:44,borderRadius:12,background:T.card,border:`1px solid ${T.border}`,color:T.text,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
        {DAYS_SHORT.map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:10,color:T.dim,fontFamily:T.mono,fontWeight:700,padding:"4px 0"}}>{d}</div>
        ))}
      </div>

      {/* Calendar Grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:20}}>
        {Array.from({length:firstDay}).map((_,i)=>(
          <div key={`e${i}`} style={{minHeight:72,borderRadius:10,background:"transparent"}}/>
        ))}
        {Array.from({length:daysInMonth}).map((_,i)=>{
          const day    = i+1;
          const dk     = dateKey(year,month,day);
          const dayEvs = eventsForDate(dk);
          const isToday = dk===todayStr;
          const hasEvs  = dayEvs.length>0;
          const dow     = (firstDay + i) % 7; // 0=Sun

          return (
            <div key={day} onClick={()=>openAdd(dk)} style={{
              minHeight:72,borderRadius:10,
              background: isToday?`${T.blue}18`:T.card,
              border: isToday?`1.5px solid ${T.blue}80`:`1px solid ${T.border}`,
              cursor:"pointer",padding:"5px 4px 4px",
              position:"relative",overflow:"visible",
              transition:"all .2s",
              boxShadow: hasEvs?dayEvs.map(ev=>`0 0 6px ${evColor(ev.type)}35`).join(","):"none",
            }}>
              <div style={{
                fontSize:13,fontWeight:isToday?700:500,
                color:isToday?T.blue:T.text,
                textAlign:"center",marginBottom:3,
                textShadow:isToday?`0 0 8px ${T.blue}`:"none",
              }}>{day}</div>

              {/* Event bars */}
              {dayEvs.slice(0,3).map((ev,ei)=>{
                const pos   = spanPos(ev,dk);
                const col   = evColor(ev.type);
                const multi = ev.startDate!==ev.endDate;
                const isFirstOfWeek = dow===0;
                const isLastOfWeek  = dow===6;
                const isFirstDay    = pos==="start"||pos==="single";
                const isLastDay     = pos==="end"||pos==="single";

                // For spanning bars, remove border-radius on connected sides
                const rTL = (isFirstDay||isFirstOfWeek) ? 5 : 0;
                const rBL = (isFirstDay||isFirstOfWeek) ? 5 : 0;
                const rTR = (isLastDay||isLastOfWeek)   ? 5 : 0;
                const rBR = (isLastDay||isLastOfWeek)   ? 5 : 0;

                return (
                  <div key={ei}
                    onClick={e=>{e.stopPropagation();openEdit(ev);}}
                    style={{
                      fontSize:9,fontWeight:700,fontFamily:T.mono,
                      color: multi&&pos!=="single" ? col : col,
                      background: multi&&pos!=="single"
                        ? `${col}28`
                        : `${col}20`,
                      border:`1px solid ${col}${multi&&pos!=="single"?"55":"50"}`,
                      // Negative margins to stretch spanning bars edge-to-edge
                      marginLeft: (!isFirstDay&&!isFirstOfWeek) ? -4 : 0,
                      marginRight:(!isLastDay &&!isLastOfWeek)  ? -4 : 0,
                      borderLeftWidth:  (!isFirstDay&&!isFirstOfWeek) ? 0 : 1,
                      borderRightWidth: (!isLastDay &&!isLastOfWeek)  ? 0 : 1,
                      borderRadius:`${rTL}px ${rTR}px ${rBR}px ${rBL}px`,
                      padding: multi&&pos!=="single" ? "2px 4px" : "1px 3px",
                      marginBottom:2,
                      overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",
                      boxShadow:`0 0 6px ${col}50`,
                      lineHeight:1.4,
                      cursor:"pointer",
                    }}>
                    {/* Only show label on start or week-start */}
                    {(pos==="start"||pos==="single"||isFirstOfWeek)
                      ? `${evIcon(ev.type)} ${ev.team||"Event"}`
                      : pos==="end" ? "◀" : "·"
                    }
                  </div>
                );
              })}
              {dayEvs.length>3&&<div style={{fontSize:8,color:T.dim,textAlign:"center"}}>+{dayEvs.length-3}</div>}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
        {EVENT_TYPES.map(et=>(
          <div key={et.id} style={{display:"flex",alignItems:"center",gap:5,background:`${et.color}12`,border:`1px solid ${et.color}35`,borderRadius:8,padding:"4px 10px"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:et.color,boxShadow:`0 0 5px ${et.color}`}}/>
            <span style={{fontSize:11,color:et.color,fontFamily:T.mono}}>{et.label}</span>
          </div>
        ))}
      </div>

      {/* Upcoming Events */}
      {upcoming.length>0&&(
        <div style={{marginBottom:20}}>
          <Label text="Upcoming Events"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {upcoming.map((ev,i)=>{
              const fmt = (dk) => { const [y2,m2,d2]=dk.split("-"); return new Date(Number(y2),Number(m2)-1,Number(d2)).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); };
              const isMulti  = ev.startDate!==ev.endDate;
              const daysAway = Math.ceil((new Date(ev.startDate)-new Date(todayStr))/(1000*60*60*24));
              const durDays  = Math.ceil((new Date(ev.endDate)-new Date(ev.startDate))/(1000*60*60*24))+1;
              const col = evColor(ev.type);
              const isActive = ev.startDate<=todayStr && ev.endDate>=todayStr;
              return(
                <div key={i} onClick={()=>openEdit(ev)} style={{
                  background:`linear-gradient(135deg,${col}14,${col}06)`,
                  border:`1.5px solid ${col}60`,
                  borderRadius:14,padding:"14px 16px",cursor:"pointer",
                  boxShadow:`0 0 10px ${col}30,0 0 20px ${col}15`,
                  transition:"all .2s",
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <div style={{width:44,height:44,borderRadius:12,background:`${col}20`,border:`1px solid ${col}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,boxShadow:`0 0 8px ${col}40`}}>
                        {evIcon(ev.type)}
                      </div>
                      <div>
                        <div style={{fontSize:15,fontWeight:700,color:T.text}}>{ev.team||"Event"}</div>
                        <div style={{fontSize:12,color:col,fontFamily:T.mono,marginTop:2}}>
                          {isMulti ? `${fmt(ev.startDate)} → ${fmt(ev.endDate)}` : fmt(ev.startDate)}
                          {ev.time&&!isMulti&&` · ${ev.time}`}
                        </div>
                        {isMulti&&<div style={{fontSize:11,color:T.sub,marginTop:2}}>📅 {durDays} days</div>}
                        {ev.location&&<div style={{fontSize:11,color:T.sub,marginTop:2}}>📍 {ev.location}</div>}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{
                        background:`${col}20`,border:`1px solid ${col}50`,
                        borderRadius:8,padding:"3px 10px",
                        fontSize:11,fontWeight:700,color:col,fontFamily:T.mono,
                        boxShadow:`0 0 6px ${col}40`,
                      }}>
                        {isActive?"🔴 NOW":daysAway===0?"TODAY":daysAway===1?"TOMORROW":`${daysAway}d`}
                      </div>
                      {ev.by&&<div style={{marginTop:4}}><ByBadge by={ev.by} at={ev.at}/></div>}
                    </div>
                  </div>
                  {ev.notes&&<div style={{marginTop:10,fontSize:12,color:T.sub,lineHeight:1.5,borderTop:`1px solid ${col}20`,paddingTop:8}}>{ev.notes}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {upcoming.length===0&&(
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"36px 20px",textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:36,marginBottom:10}}>📅</div>
          <div style={{fontSize:15,color:T.sub}}>No upcoming events</div>
          <div style={{fontSize:12,color:T.dim,marginTop:5}}>Tap any day on the calendar to add an event</div>
        </div>
      )}

      {/* ── MODAL ── */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"#1a1d27",borderRadius:"20px 20px 0 0",
            border:`1px solid ${T.border2}`,borderBottom:"none",
            width:"100%",maxWidth:700,
            padding:"20px 18px",
            paddingBottom:`calc(24px + env(safe-area-inset-bottom))`,
            maxHeight:"90vh",overflowY:"auto",
          }}>
            <div style={{width:36,height:4,borderRadius:2,background:T.dim,margin:"0 auto 20px"}}/>
            <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>
              {modal.mode==="edit"?"Edit Event":"Add Event"}
            </div>

            {/* Event Type */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:8,fontWeight:600}}>Event Type</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {EVENT_TYPES.map(et=>(
                  <button key={et.id} onClick={()=>setForm(f=>({...f,type:et.id}))} style={{
                    padding:"10px 6px",borderRadius:10,
                    background:form.type===et.id?`${et.color}25`:T.lift,
                    border:`1.5px solid ${form.type===et.id?et.color:T.border}`,
                    color:form.type===et.id?et.color:T.sub,
                    fontSize:12,fontFamily:T.sans,cursor:"pointer",
                    boxShadow:form.type===et.id?`0 0 8px ${et.color}50`:"none",
                    transition:"all .2s",
                  }}>
                    <div style={{fontSize:18,marginBottom:3}}>{et.icon}</div>
                    {et.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Team / Event Name */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>Team / Event Name</div>
              <input value={form.team||""} onChange={e=>setForm(f=>({...f,team:e.target.value}))}
                placeholder="e.g. Houston Banditos, Perfect Game Showcase…"
                style={{...iStyle(evColor(form.type||"tryout"))}}/>
            </div>

            {/* Start + End Date */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>Start Date</div>
                <input type="date" value={form.startDate||""} onChange={e=>setForm(f=>({...f,startDate:e.target.value,endDate:f.endDate&&f.endDate>=e.target.value?f.endDate:e.target.value}))}
                  style={{...iStyle(),colorScheme:"dark"}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>End Date</div>
                <input type="date" value={form.endDate||form.startDate||""} min={form.startDate||""} onChange={e=>setForm(f=>({...f,endDate:e.target.value}))}
                  style={{...iStyle(form.endDate&&form.endDate!==form.startDate?evColor(form.type||"tryout"):""),colorScheme:"dark"}}/>
              </div>
            </div>

            {/* Multi-day indicator */}
            {form.startDate&&form.endDate&&form.startDate!==form.endDate&&(
              <div style={{background:`${evColor(form.type||"tryout")}15`,border:`1px solid ${evColor(form.type||"tryout")}40`,borderRadius:10,padding:"9px 14px",marginBottom:12,fontSize:12,color:evColor(form.type||"tryout"),fontFamily:T.mono}}>
                📅 {Math.ceil((new Date(form.endDate)-new Date(form.startDate))/(1000*60*60*24))+1}-day event
              </div>
            )}

            {/* Time + Location */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>Time</div>
                <input value={form.time||""} onChange={e=>setForm(f=>({...f,time:e.target.value}))}
                  placeholder="e.g. 9:00 AM" style={{...iStyle()}}/>
              </div>
              <div>
                <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>Location</div>
                <input value={form.location||""} onChange={e=>setForm(f=>({...f,location:e.target.value}))}
                  placeholder="Field / City" style={{...iStyle()}}/>
              </div>
            </div>

            {/* Notes */}
            <div style={{marginBottom:18}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>Notes</div>
              <textarea value={form.notes||""} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                placeholder="Bring gear, contact info, directions, what to prepare…"
                rows={3} style={{...iStyle(),resize:"none"}}/>
            </div>

            {/* Save */}
            <button onClick={saveEvent} style={{
              width:"100%",background:evColor(form.type||"tryout"),border:"none",
              borderRadius:14,padding:"16px",color:"#fff",fontSize:15,fontWeight:700,
              fontFamily:T.sans,cursor:"pointer",marginBottom:10,
              boxShadow:`0 0 16px ${evColor(form.type||"tryout")}60`,
              transition:"all .2s",
            }}>
              {modal.mode==="edit"?"Save Changes ✓":"Add to Calendar ✓"}
            </button>

            {modal.mode==="edit"&&(
              delConfirm?(
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>deleteEvent(form)} style={{flex:1,background:"#3a0a0a",border:`1px solid ${T.red}`,borderRadius:12,padding:"13px",color:T.red,fontSize:14,fontWeight:700,fontFamily:T.sans,cursor:"pointer"}}>Yes, Delete</button>
                  <button onClick={()=>setDelConfirm(null)} style={{flex:1,background:T.lift,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px",color:T.sub,fontSize:14,fontFamily:T.sans,cursor:"pointer"}}>Cancel</button>
                </div>
              ):(
                <button onClick={()=>setDelConfirm(true)} style={{width:"100%",background:"transparent",border:`1px solid ${T.border}`,borderRadius:12,padding:"12px",color:T.dim,fontSize:13,fontFamily:T.sans,cursor:"pointer"}}>Delete Event</button>
              )
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── NOTES TAB ───────────────────────────────────────────── */
const NOTE_CATS = [
  { id:"coaching", label:"Coaching",    color:"#5aadff", icon:"🎯" },
  { id:"scouting", label:"Scouting",    color:"#00d9a3", icon:"👁️"  },
  { id:"mindset",  label:"Mindset",     color:"#b197fc", icon:"🧠" },
  { id:"strength", label:"Strength",    color:"#ff5c5c", icon:"💪" },
  { id:"general",  label:"General",     color:"#ffb84d", icon:"📝" },
];
const noteColor = (cat) => NOTE_CATS.find(c=>c.id===cat)?.color || T.sub;
const noteIcon  = (cat) => NOTE_CATS.find(c=>c.id===cat)?.icon  || "📝";

function NotesTab({ identity }) {
  const [notes,      setNotes]      = useState({});
  const [modal,      setModal]      = useState(null);
  const [form,       setForm]       = useState({});
  const [filter,     setFilter]     = useState("all");
  const [search,     setSearch]     = useState("");
  const [delConfirm, setDelConfirm] = useState(null);
  const [expanded,   setExpanded]   = useState(null);

  useEffect(()=>{
    fbListen(`${ROOT}/notes`, val => setNotes(val||{}));
  },[]);

  const allNotes = Object.values(notes)
    .sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

  const filtered = allNotes.filter(n => {
    const matchCat = filter==="all" || n.category===filter;
    const matchSearch = !search.trim() ||
      n.title?.toLowerCase().includes(search.toLowerCase()) ||
      n.body?.toLowerCase().includes(search.toLowerCase());
    return matchCat && matchSearch;
  });

  const openNew = () => {
    setForm({ category:"coaching", title:"", body:"", pinned:false });
    setModal("new");
  };
  const openEdit = (note) => {
    setForm({...note});
    setModal("edit");
  };

  const saveNote = () => {
    if(!form.title?.trim() && !form.body?.trim()) return;
    const id = modal==="edit" ? form.id : `note_${Date.now()}`;
    const s  = { ...form, id,
      by:       identity,
      byAt:     new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}),
      createdAt: modal==="edit" ? (form.createdAt||Date.now()) : Date.now(),
      updatedAt: Date.now(),
    };
    fbUpd(`${ROOT}/notes/${id}`, s);
    setModal(null);
  };

  const deleteNote = (id) => {
    window.__fbSet(window.__fbRef(window.__fbDb,`${ROOT}/notes/${id}`), null);
    setDelConfirm(null); setModal(null);
  };

  const togglePin = (note) => {
    fbUpd(`${ROOT}/notes/${note.id}`, { pinned: !note.pinned });
  };

  const pinned   = filtered.filter(n=>n.pinned);
  const unpinned = filtered.filter(n=>!n.pinned);

  return (
    <div>
      {/* Search + Add row */}
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        <div style={{flex:1,position:"relative"}}>
          <svg style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:T.dim,pointerEvents:"none"}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search notes…"
            style={{...iStyle(),paddingLeft:38,paddingTop:11,paddingBottom:11}}/>
        </div>
        <button onClick={openNew} style={{
          width:48,height:48,borderRadius:12,flexShrink:0,
          background:`linear-gradient(135deg,${T.blue},#3a8eff)`,
          border:"none",color:"#fff",fontSize:24,cursor:"pointer",
          boxShadow:`0 0 14px ${T.blue}60`,display:"flex",alignItems:"center",justifyContent:"center",
        }}>+</button>
      </div>

      {/* Category Filter Pills */}
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:18,WebkitOverflowScrolling:"touch"}}>
        <button onClick={()=>setFilter("all")} style={{
          flexShrink:0,padding:"7px 16px",borderRadius:20,
          background:filter==="all"?T.blue:"transparent",
          border:`1px solid ${filter==="all"?T.blue:T.border}`,
          color:filter==="all"?"#fff":T.sub,
          fontSize:12,fontFamily:T.sans,cursor:"pointer",fontWeight:filter==="all"?700:400,
          boxShadow:filter==="all"?`0 0 8px ${T.blue}50`:"none",
          transition:"all .2s",whiteSpace:"nowrap",
        }}>All {allNotes.length>0&&`(${allNotes.length})`}</button>
        {NOTE_CATS.map(cat=>{
          const count = allNotes.filter(n=>n.category===cat.id).length;
          if(count===0&&filter!==cat.id) return null;
          return(
            <button key={cat.id} onClick={()=>setFilter(cat.id)} style={{
              flexShrink:0,padding:"7px 14px",borderRadius:20,
              background:filter===cat.id?`${cat.color}25`:"transparent",
              border:`1px solid ${filter===cat.id?cat.color:T.border}`,
              color:filter===cat.id?cat.color:T.sub,
              fontSize:12,fontFamily:T.sans,cursor:"pointer",fontWeight:filter===cat.id?700:400,
              boxShadow:filter===cat.id?`0 0 8px ${cat.color}40`:"none",
              transition:"all .2s",whiteSpace:"nowrap",
            }}>{cat.icon} {cat.label} {count>0&&`(${count})`}</button>
          );
        })}
      </div>

      {/* Pinned Notes */}
      {pinned.length>0&&(
        <div style={{marginBottom:18}}>
          <Label text="📌 Pinned"/>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {pinned.map(note=><NoteCard key={note.id} note={note} expanded={expanded===note.id} onExpand={()=>setExpanded(expanded===note.id?null:note.id)} onEdit={()=>openEdit(note)} onPin={()=>togglePin(note)}/>)}
          </div>
        </div>
      )}

      {/* All / Filtered Notes */}
      {unpinned.length>0 ? (
        <div>
          {pinned.length>0&&<Label text="Notes"/>}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {unpinned.map(note=><NoteCard key={note.id} note={note} expanded={expanded===note.id} onExpand={()=>setExpanded(expanded===note.id?null:note.id)} onEdit={()=>openEdit(note)} onPin={()=>togglePin(note)}/>)}
          </div>
        </div>
      ) : filtered.length===0 && (
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:"40px 20px",textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:10}}>{search?"🔍":"📝"}</div>
          <div style={{fontSize:15,color:T.sub}}>{search?"No notes match your search":"No notes yet"}</div>
          <div style={{fontSize:12,color:T.dim,marginTop:5}}>
            {search?"Try different keywords":"Tap + to add your first note"}
          </div>
        </div>
      )}

      {/* ── NEW / EDIT MODAL ── */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"#1a1d27",borderRadius:"20px 20px 0 0",
            border:`1px solid ${T.border2}`,borderBottom:"none",
            width:"100%",maxWidth:700,
            padding:"20px 18px",
            paddingBottom:`calc(24px + env(safe-area-inset-bottom))`,
            maxHeight:"90vh",overflowY:"auto",
          }}>
            <div style={{width:36,height:4,borderRadius:2,background:T.dim,margin:"0 auto 20px"}}/>
            <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>{modal==="edit"?"Edit Note":"New Note"}</div>

            {/* Category */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:8,fontWeight:600}}>Category</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
                {NOTE_CATS.map(cat=>(
                  <button key={cat.id} onClick={()=>setForm(f=>({...f,category:cat.id}))} style={{
                    padding:"9px 6px",borderRadius:10,
                    background:form.category===cat.id?`${cat.color}22`:T.lift,
                    border:`1.5px solid ${form.category===cat.id?cat.color:T.border}`,
                    color:form.category===cat.id?cat.color:T.sub,
                    fontSize:12,fontFamily:T.sans,cursor:"pointer",
                    boxShadow:form.category===cat.id?`0 0 8px ${cat.color}40`:"none",
                    transition:"all .2s",
                  }}>
                    <div style={{fontSize:16,marginBottom:2}}>{cat.icon}</div>
                    {cat.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Title */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>Title</div>
              <input value={form.title||""} onChange={e=>setForm(f=>({...f,title:e.target.value}))}
                placeholder="Note title…"
                style={{...iStyle(noteColor(form.category))}}/>
            </div>

            {/* Body */}
            <div style={{marginBottom:14}}>
              <div style={{fontSize:12,color:T.sub,marginBottom:6,fontWeight:600}}>Note</div>
              <textarea value={form.body||""} onChange={e=>setForm(f=>({...f,body:e.target.value}))}
                placeholder="Write your note here — coaching tips, scouting observations, mental cues, anything…"
                rows={6} style={{...iStyle(),resize:"none",lineHeight:1.6}}/>
            </div>

            {/* Pin toggle */}
            <button onClick={()=>setForm(f=>({...f,pinned:!f.pinned}))} style={{
              width:"100%",background:form.pinned?`${T.amber}15`:T.lift,
              border:`1px solid ${form.pinned?T.amber:T.border}`,
              borderRadius:10,padding:"11px",color:form.pinned?T.amber:T.sub,
              fontSize:13,fontFamily:T.sans,cursor:"pointer",marginBottom:14,
              boxShadow:form.pinned?`0 0 8px ${T.amber}40`:"none",
              transition:"all .2s",
            }}>
              {form.pinned?"📌 Pinned — tap to unpin":"📌 Pin this note to the top"}
            </button>

            {/* Save */}
            <button onClick={saveNote} style={{
              width:"100%",background:noteColor(form.category||"coaching"),
              border:"none",borderRadius:14,padding:"16px",
              color:"#fff",fontSize:15,fontWeight:700,fontFamily:T.sans,cursor:"pointer",
              boxShadow:`0 0 16px ${noteColor(form.category||"coaching")}55`,
              marginBottom:10,transition:"all .2s",
            }}>
              {modal==="edit"?"Save Changes ✓":"Save Note ✓"}
            </button>

            {modal==="edit"&&(
              delConfirm?(
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>deleteNote(form.id)} style={{flex:1,background:"#3a0a0a",border:`1px solid ${T.red}`,borderRadius:12,padding:"13px",color:T.red,fontSize:14,fontWeight:700,fontFamily:T.sans,cursor:"pointer"}}>Yes, Delete</button>
                  <button onClick={()=>setDelConfirm(null)} style={{flex:1,background:T.lift,border:`1px solid ${T.border}`,borderRadius:12,padding:"13px",color:T.sub,fontSize:14,fontFamily:T.sans,cursor:"pointer"}}>Cancel</button>
                </div>
              ):(
                <button onClick={()=>setDelConfirm(true)} style={{width:"100%",background:"transparent",border:`1px solid ${T.border}`,borderRadius:12,padding:"12px",color:T.dim,fontSize:13,fontFamily:T.sans,cursor:"pointer"}}>Delete Note</button>
              )
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function NoteCard({ note, expanded, onExpand, onEdit, onPin }) {
  const col  = noteColor(note.category);
  const icon = noteIcon(note.category);
  const lines = (note.body||"").split("\n");
  const preview = lines.slice(0,2).join(" ").slice(0,120);
  const hasMore = note.body?.length > 120 || lines.length > 2;

  return (
    <div style={{
      background:`linear-gradient(135deg,${col}10,${col}04)`,
      border:`1.5px solid ${col}50`,
      borderRadius:14,overflow:"hidden",
      boxShadow:`0 0 10px ${col}25`,
      transition:"all .25s",
    }}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",gap:12,padding:"14px 14px 10px"}} onClick={onExpand}>
        {/* Category icon */}
        <div style={{width:40,height:40,borderRadius:10,background:`${col}18`,border:`1px solid ${col}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,boxShadow:`0 0 6px ${col}30`}}>
          {icon}
        </div>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}}>
          {note.title&&<div style={{fontSize:15,fontWeight:700,color:T.text,marginBottom:3}}>{note.title}</div>}
          <div style={{fontSize:13,color:T.sub,lineHeight:1.55}}>
            {expanded ? (note.body||"") : (preview+(hasMore&&!expanded?"…":""))}
          </div>
          {hasMore&&(
            <div style={{fontSize:11,color:col,marginTop:6,fontWeight:600}}>
              {expanded?"Show less ▲":"Show more ▼"}
            </div>
          )}
        </div>
      </div>

      {/* Footer */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px 12px",borderTop:`1px solid ${col}15`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:10,color:col,fontFamily:T.mono,fontWeight:700,background:`${col}15`,padding:"2px 7px",borderRadius:5}}>{NOTE_CATS.find(c=>c.id===note.category)?.label||"Note"}</span>
          {note.by&&<ByBadge by={note.by} at={note.byAt}/>}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={e=>{e.stopPropagation();onPin();}} style={{
            width:32,height:32,borderRadius:8,
            background:note.pinned?`${T.amber}20`:"transparent",
            border:`1px solid ${note.pinned?T.amber:T.border}`,
            color:note.pinned?T.amber:T.dim,fontSize:13,cursor:"pointer",
            boxShadow:note.pinned?`0 0 6px ${T.amber}40`:"none",
            transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",
          }}>📌</button>
          <button onClick={e=>{e.stopPropagation();onEdit();}} style={{
            width:32,height:32,borderRadius:8,background:`${col}15`,
            border:`1px solid ${col}40`,color:col,fontSize:13,cursor:"pointer",
            transition:"all .2s",display:"flex",alignItems:"center",justifyContent:"center",
          }}>✏️</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
